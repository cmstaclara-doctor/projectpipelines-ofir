<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ProjectPipelines by Doc Kalodski</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;background:#0f1419;color:#fff;font-family:system-ui,-apple-system,sans-serif;overflow:hidden}.screen{display:none;width:100%;height:100%;position:fixed;inset:0;z-index:50;background:#0f1419;flex-direction:column}.screen.active{display:flex}#login-screen{justify-content:center;align-items:center}.login-box{background:#1a1f26;border-radius:8px;padding:2rem;width:100%;max-width:340px;border:1px solid #2a2f36}.login-title{font-size:18px;font-weight:700;color:#0F6E56;margin-bottom:0.5rem;text-align:center}.login-sub{font-size:12px;color:#888;text-align:center;margin-bottom:2rem}.login-field{margin-bottom:1rem}.login-label{font-size:10px;color:#888;text-transform:uppercase;font-weight:600;display:block;margin-bottom:6px}.login-input{width:100%;background:#242b32;border:1px solid #2a2f36;color:#fff;padding:8px 12px;border-radius:4px;font-size:12px}.login-input:focus{outline:none;border-color:#0F6E56}.login-btn{width:100%;padding:10px;background:#0F6E56;border:none;color:#fff;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;margin-top:1rem}.login-btn:hover{background:#0d5a4a}.login-btn:disabled{background:#555;cursor:not-allowed}.login-error{color:#e53935;font-size:10px;margin-top:0.5rem}.login-lockout{color:#e53935;text-align:center;font-size:11px;padding:1rem;background:#2a1515;border-radius:4px;margin-top:1rem}#app-container{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden}.header{background:linear-gradient(135deg,#0C447C,#0F6E56);padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}.header-title h1{font-size:16px;font-weight:700}.header-title p{font-size:10px;opacity:0.8;margin-top:2px}.header-right{display:flex;gap:8px;align-items:center}.entity-filter{display:flex;gap:3px}.ent-btn{padding:4px 10px;background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:3px;cursor:pointer;font-size:11px;font-weight:600}.ent-btn.active{background:#fff;color:#0F6E56}.user-badge{font-size:10px;color:#ccc;background:rgba(255,255,255,0.1);padding:4px 8px;border-radius:3px}.logout-btn{padding:6px 12px;background:rgba(229,57,53,0.2);border:1px solid #e53935;color:#e53935;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600}.tabs{display:flex;gap:4px;background:#1a1f26;padding:0.5rem;border-bottom:1px solid #2a2f36;flex-shrink:0;overflow-x:auto}.tab-btn{padding:7px 14px;background:#242b32;border:none;color:#888;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}.tab-btn.active{background:#0F6E56;color:#fff}.content{flex:1;overflow:hidden;position:relative}.tab{display:none;height:100%;overflow-y:auto;padding:1rem}.tab.active{display:block}.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}.kpi{background:#1a1f26;border-radius:6px;padding:0.75rem;border-left:4px solid #0F6E56;text-align:center}.kpi-val{font-size:18px;font-weight:700;color:#0F6E56}.kpi-lbl{font-size:9px;color:#888;text-transform:uppercase;margin-top:4px}.proj-card{background:#1a1f26;border-radius:6px;padding:0.75rem;margin-bottom:8px;cursor:pointer;transition:background 0.15s;border-left:4px solid #0F6E56}.proj-card:hover{background:#1f2630}.proj-card.stalled{border-left-color:#e53935}.proj-card.atrisk{border-left-color:#BA7517}.proj-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}.proj-name{font-size:12px;font-weight:700}.proj-client{font-size:10px;color:#888;margin-top:2px}.proj-badges{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end}.badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px}.b-ent{background:#0C447C;color:#fff}.b-stage{background:#242b32;color:#ccc}.b-stalled{background:#e53935;color:#fff}.b-risk{background:#BA7517;color:#fff}.b-urgent{background:#7B1FA2;color:#fff}.proj-vals{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}.pv{background:#242b32;padding:4px 6px;border-radius:3px}.pv-lbl{color:#888;font-size:8px;text-transform:uppercase}.pv-num{color:#0F6E56;font-weight:600;font-size:11px;margin-top:2px}.proj-foot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:9px;color:#888}.sec-h{font-size:11px;font-weight:700;color:#0F6E56;text-transform:uppercase;margin:1rem 0 8px}.sec-h:first-child{margin-top:0}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;overflow-y:auto;padding:1.5rem 1rem}.overlay.open{display:flex;justify-content:center;align-items:flex-start}.modal{background:#1a1f26;border-radius:8px;width:100%;max-width:500px}.mhdr{background:#242b32;padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;border-radius:8px 8px 0 0}.mhdr-title{font-size:13px;font-weight:700;color:#0F6E56}.mclose{background:none;border:none;color:#888;cursor:pointer;font-size:18px}.mbody{padding:1rem}.mfoot{padding:0.75rem 1rem;background:#242b32;display:flex;gap:8px;justify-content:flex-end;border-radius:0 0 8px 8px}.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:0.75rem}.fg-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}.flbl{font-size:10px;color:#888;text-transform:uppercase;font-weight:600}.fin{background:#242b32;border:1px solid #2a2f36;color:#fff;padding:6px 8px;border-radius:4px;font-size:11px;width:100%}.fin:focus{outline:none;border-color:#0F6E56}.fin.computed{color:#0F6E56;font-weight:600}.btn{padding:7px 14px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600}.btn-g{background:#0F6E56;color:#fff}.btn-x{background:#e53935;color:#fff}.btn-q{background:#242b32;color:#ccc}.empty{text-align:center;padding:1rem;color:#555;font-size:11px}.admin-table{width:100%;border-collapse:collapse;font-size:10px}.admin-table th{padding:8px;background:#242b32;color:#0F6E56;text-align:left;font-weight:600;border-bottom:1px solid #2a2f36}.admin-table td{padding:8px;border-bottom:1px solid #2a2f36;color:#ccc}.admin-table tr:hover{background:#1f2630}.toast{position:fixed;bottom:1rem;right:1rem;background:#0F6E56;color:#fff;padding:0.75rem 1rem;border-radius:6px;font-size:12px;z-index:999;display:none;max-width:280px}.toast.show{display:block}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#2a2f36;border-radius:2px}</style></head><body><div id="login-screen" class="screen active"><div class="login-box"><div class="login-title">ProjectPipelines</div><div class="login-sub">Revenue Intelligence System by Doc Kalodski</div><div class="login-field"><label class="login-label">Passkey</label><input type="password" id="passkey-input" class="login-input" placeholder="Enter passkey" maxlength="40"><div class="login-error" id="pk-error"></div></div><button class="login-btn" id="pk-btn" onclick="submitPasskey()">Continue</button><div id="lockout-msg" class="login-lockout" style="display:none"></div></div></div><div id="sq-screen" class="screen"><div class="login-box"><div class="login-title">Security Question</div><div class="login-sub" id="sq-text" style="text-align:left;margin-bottom:1.5rem;font-size:13px;color:#ccc">Question here</div><div class="login-field"><input type="text" id="sq-input" class="login-input" placeholder="Your answer"><div class="login-error" id="sq-error"></div></div><button class="login-btn" onclick="submitSecurityQuestion()">Verify</button></div></div><div id="app-container" style="display:none"><div class="header"><div class="header-title"><h1>ProjectPipelines</h1><p>Revenue Intelligence System by Doc Kalodski</p></div><div class="header-right"><div class="entity-filter" id="ent-filter"></div><div class="user-badge" id="user-badge">Loading…</div><button class="logout-btn" onclick="logout()">Logout</button></div></div><div class="tabs" id="tabs-container"></div><div class="content" id="content-area"></div></div><div id="proj-modal" class="overlay"><div class="modal"><div class="mhdr"><span class="mhdr-title" id="modal-title">Add Project</span><button class="mclose" onclick="closeModal('proj-modal')">✕</button></div><div class="mbody"><input type="hidden" id="f-id"><div class="fg-grid"><div class="fg" style="grid-column:1/-1"><label class="flbl">Project Name *</label><input class="fin" id="f-name" type="text"></div><div class="fg"><label class="flbl">Client</label><input class="fin" id="f-client" type="text"></div><div class="fg"><label class="flbl">Owner</label><input class="fin" id="f-owner" type="text"></div><div class="fg"><label class="flbl">Entity *</label><select class="fin" id="f-entity"><option>OHI</option><option>OCC</option></select></div><div class="fg"><label class="flbl">Stage</label><select class="fin" id="f-stage"><option>Prospect</option><option>Bid</option><option>In Progress</option><option>Waiting</option><option>Won</option><option>Lost</option></select></div><div class="fg"><label class="flbl">Contract Value (PHP)</label><input class="fin" id="f-cv" type="number" min="0"></div><div class="fg"><label class="flbl">Collected (PHP)</label><input class="fin" id="f-col" type="number" min="0" value="0"></div><div class="fg"><label class="flbl">Start Date</label><input class="fin" id="f-start" type="date"></div><div class="fg"><label class="flbl">Expected Close</label><input class="fin" id="f-close" type="date"></div><div class="fg" style="grid-column:1/-1"><label class="flbl">Current Step</label><input class="fin" id="f-step" type="text"></div></div></div><div class="mfoot"><button class="btn btn-x" id="del-btn" onclick="deleteProject()" style="display:none">Delete</button><button class="btn btn-q" onclick="closeModal('proj-modal')">Cancel</button><button class="btn btn-g" onclick="saveProject()">Save</button></div></div></div><div id="admin-modal" class="overlay"><div class="modal" style="max-width:700px"><div class="mhdr"><span class="mhdr-title">Admin Panel</span><button class="mclose" onclick="closeModal('admin-modal')">✕</button></div><div class="mbody"><div style="display:flex;gap:8px;margin-bottom:1rem"><button class="tab-btn active" onclick="switchAdminTab('users',this)">Users</button><button class="tab-btn" onclick="switchAdminTab('audit',this)">Audit Log</button><button class="tab-btn" onclick="switchAdminTab('security',this)">Security</button></div><div id="admin-users-tab"><button class="btn btn-g" style="margin-bottom:1rem" onclick="openNewUserForm()">+ Add User</button><table class="admin-table" id="users-table"></table></div><div id="admin-audit-tab" style="display:none"><table class="admin-table" id="audit-table"></table></div><div id="admin-security-tab" style="display:none"><div id="security-info"></div></div></div></div></div><div id="toast" class="toast"></div><script>const SB_URL='https://ayohrbnesgstmjqbcbod.supabase.co';const SB_KEY='sb_publishable_pGabnINddI3IbA6lYYECvg_MB1kZxB2';const PROB={1:.10,2:.30,3:.50,4:.70,5:.90};let sb;let curUser=null;let curEntity='All';let projects=[];async function hashSHA(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(x=>x.toString(16).padStart(2,'0')).join('')}function uid(){return crypto.getRandomValues(new Uint8Array(16)).reduce((s,b)=>s+(b<16?'0':'')+b.toString(16),'')}function today(){return new Date().toISOString().slice(0,10)}function fmt(n){if(!n&&n!==0)return'—';const a=Math.abs(n);if(a>=1e9)return'₱'+(n/1e9).toFixed(2)+'B';if(a>=1e6)return'₱'+(n/1e6).toFixed(1)+'M';if(a>=1e3)return'₱'+(n/1e3).toFixed(0)+'K';return'₱'+Math.round(n).toLocaleString('en-PH')}function stars(r){return'★'.repeat(r||0)+'☆'.repeat(5-(r||0))}function daysDiff(d){if(!d)return 0;return Math.max(0,Math.floor((Date.now()-new Date(d))/86400000))}function daysUntil(d){if(!d)return 999;return Math.floor((new Date(d)-Date.now())/86400000)}async function initSupabase(){sb=window.supabase.createClient(SB_URL,SB_KEY);const token=sessionStorage.getItem('pp_token');if(token){const {data:sess}=await sb.from('pp_sessions').select('user_id,expires_at').eq('token',token).single().catch(()=>({data:null}));if(sess&&new Date(sess.expires_at)>new Date()){const {data:user}=await sb.from('pp_users').select('*').eq('id',sess.user_id).single().catch(()=>({data:null}));if(user){curUser=user;showApp();return}}sessionStorage.removeItem('pp_token')}showLogin()}async function submitPasskey(){const pk=document.getElementById('passkey-input').value;if(!pk){toast('Passkey required');return}const hash=await hashSHA(pk);const {data:user}=await sb.from('pp_users').select('*').eq('passkey_hash',hash).eq('is_active',true).single().catch(()=>({data:null}));if(!user){document.getElementById('pk-error').textContent='Invalid passkey';return}if(user.locked_until&&new Date(user.locked_until)>new Date()){const mins=Math.ceil((new Date(user.locked_until)-Date.now())/60000);document.getElementById('lockout-msg').textContent=`Locked for ${mins}min`;document.getElementById('lockout-msg').style.display='block';return}curUser=user;document.getElementById('sq-text').textContent=user.security_question;showScreen('sq-screen')}async function submitSecurityQuestion(){const ans=document.getElementById('sq-input').value;if(!ans){toast('Answer required');return}const hash=await hashSHA(ans);if(hash!==curUser.security_answer_hash){document.getElementById('sq-error').textContent='Wrong answer';return}const token=uid();const expires=new Date(Date.now()+8*3600000);await sb.from('pp_sessions').insert({user_id:curUser.id,token,expires_at:expires.toISOString()});sessionStorage.setItem('pp_token',token);await sb.from('pp_audit_log').insert({user_id:curUser.id,event_type:'login_success'});showApp()}function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}async function showApp(){document.getElementById('login-screen').style.display='none';document.getElementById('sq-screen').style.display='none';document.getElementById('app-container').style.display='flex';document.getElementById('user-badge').textContent=`${curUser.display_name} (${curUser.role})`;const tabs=['Dashboard','Projects','Alerts','Metrics'];if(curUser.role==='admin')tabs.push('Admin');let html='';tabs.forEach(t=>{const icon=t==='Dashboard'?'📊':t==='Projects'?'📋':t==='Alerts'?'🚨':t==='Metrics'?'📈':'⚙️';html+=`<button class="tab-btn ${t==='Dashboard'?'active':''}" onclick="switchTab('${t}',this)">${icon} ${t}</button>`});document.getElementById('tabs-container').innerHTML=html;let ent='<button class="ent-btn active" onclick="setEntity(\'All\',this)">All</button>';ent+='<button class="ent-btn" onclick="setEntity(\'OHI\',this)">OHI</button>';ent+='<button class="ent-btn" onclick="setEntity(\'OCC\',this)">OCC</button>';if(curUser.role!=='viewer'){ent+=`<button class="btn btn-g" style="padding:4px 8px;font-size:10px;margin-left:8px" onclick="openProjectAdd()">+ Add</button>`}document.getElementById('ent-filter').innerHTML=ent;await loadProjects();switchTab('Dashboard',document.querySelector('.tab-btn'))}async function loadProjects(){const {data:p}=await sb.from('pp_projects').select('*').catch(()=>({data:[]}));projects=(p||[]).map(derive)}function derive(p){const pr=PROB[p.probability_rating]||0;p.probability_percent=pr;p.expected_value=(p.contract_value||0)*pr;p.outstanding_amount=Math.max(0,(p.contract_value||0)-(p.collected_amount||0));p.days_inactive=daysDiff(p.last_activity_date);if(p.days_inactive>14)p.health_status='Stalled';else if((p.contract_value||0)>=1000000&&['Prospect','Bid'].includes(p.stage))p.health_status='At Risk';else p.health_status='Active';const uf=1+(p.days_inactive/30)*0.5;p.priority_score=(p.contract_value||0)*pr*uf;return p}function setEntity(e,btn){curEntity=e;document.querySelectorAll('.ent-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');refreshTab()}function filtered(){return curEntity==='All'?projects:projects.filter(p=>p.entity===curEntity)}function switchTab(name,btn){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(name==='Admin'&&curUser.role==='admin'){loadAuditTab();document.getElementById('admin-modal').classList.add('open');return}const fp=filtered();let html='';if(name==='Dashboard'){const totalPipe=fp.reduce((s,p)=>s+(p.contract_value||0),0);const wt=fp.reduce((s,p)=>s+(p.expected_value||0),0);const col=fp.reduce((s,p)=>s+(p.collected_amount||0),0);const out=fp.reduce((s,p)=>s+(p.outstanding_amount||0),0);const active=fp.filter(p=>p.health_status==='Active').length;const stalled=fp.filter(p=>p.health_status==='Stalled').length;html=`<div class="kpi-grid"><div class="kpi"><div class="kpi-val">${fmt(totalPipe)}</div><div class="kpi-lbl">Total Pipeline</div></div><div class="kpi"><div class="kpi-val">${fmt(wt)}</div><div class="kpi-lbl">Weighted</div></div><div class="kpi"><div class="kpi-val">${fmt(col)}</div><div class="kpi-lbl">Collected</div></div><div class="kpi" style="border-left-color:#BA7517"><div class="kpi-val" style="color:#BA7517">${fmt(out)}</div><div class="kpi-lbl">Outstanding</div></div><div class="kpi" style="border-left-color:#4CAF50"><div class="kpi-val" style="color:#4CAF50">${active}</div><div class="kpi-lbl">Active</div></div><div class="kpi" style="border-left-color:#e53935"><div class="kpi-val" style="color:#e53935">${stalled}</div><div class="kpi-lbl">Stalled</div></div></div><div class="sec-h">Priority Pipeline</div>`;const sorted=[...fp].sort((a,b)=>b.priority_score-a.priority_score);html+=sorted.length?sorted.map(cardHTML).join(''):'<div class="empty">No projects</div>'}else if(name==='Projects'){const sorted=[...fp].sort((a,b)=>b.priority_score-a.priority_score);html=sorted.length?sorted.map(cardHTML).join(''):'<div class="empty">No projects</div>'}else if(name==='Alerts'){const st=fp.filter(p=>p.health_status==='Stalled');const ri=fp.filter(p=>p.health_status==='At Risk');const ur=fp.filter(p=>{const d=daysUntil(p.expected_close_date);return d>=0&&d<7});html=`<div class="sec-h">Stalled</div>`;html+=st.length?st.map(p=>`<div class="proj-card stalled" onclick="openProjectDetail('${p.id}')"><div class="proj-name">${p.project_name}</div><div class="proj-client">${p.days_inactive}d inactive</div></div>`).join(''):'<div class="empty">None</div>';html+=`<div class="sec-h">High Risk</div>`;html+=ri.length?ri.map(p=>`<div class="proj-card atrisk" onclick="openProjectDetail('${p.id}')"><div class="proj-name">${p.project_name}</div><div class="proj-client">${fmt(p.contract_value)} at ${p.stage}</div></div>`).join(''):'<div class="empty">None</div>';html+=`<div class="sec-h">Urgent</div>`;html+=ur.length?ur.map(p=>`<div class="proj-card" onclick="openProjectDetail('${p.id}')"><div class="proj-name">${p.project_name}</div><div class="proj-client">Closes ${p.expected_close_date}</div></div>`).join(''):'<div class="empty">None</div>'}else if(name==='Metrics'){const won=fp.filter(p=>p.stage==='Won');const totalCv=fp.reduce((s,p)=>s+(p.contract_value||0),0);const totalWt=fp.reduce((s,p)=>s+(p.expected_value||0),0);const col=fp.reduce((s,p)=>s+(p.collected_amount||0),0);const cr=fp.length?Math.round(won.length/fp.length*100):0;const wtc=totalWt?Math.round(col/totalWt*100):0;const real=totalCv?Math.round(col/totalCv*100):0;html=`<table class="admin-table"><tr><th>Metric</th><th>Value</th></tr><tr><td>Conversion Rate</td><td>${cr}%</td></tr><tr><td>Weighted Conversion</td><td>${wtc}%</td></tr><tr><td>Realization Rate</td><td>${real}%</td></tr><tr><td>Total Pipeline</td><td>${fmt(totalCv)}</td></tr><tr><td>Weighted</td><td>${fmt(totalWt)}</td></tr><tr><td>Collected</td><td>${fmt(col)}</td></tr></table>`}else{html='<div class="empty">Unauthorized</div>'}document.getElementById('content-area').innerHTML=`<div class="tab active">${html}</div>`}function refreshTab(){const active=document.querySelector('.tab-btn.active');if(active)switchTab(active.textContent.trim().slice(1),active)}function cardHTML(p){const hc=p.health_status==='Stalled'?'stalled':p.health_status==='At Risk'?'atrisk':'';const du=daysUntil(p.expected_close_date);let badges=`<span class="badge b-ent">${p.entity}</span><span class="badge b-stage">${p.stage}</span>`;if(p.health_status==='Stalled')badges+=`<span class="badge b-stalled">STALLED</span>`;if(p.health_status==='At Risk')badges+=`<span class="badge b-risk">HIGH RISK</span>`;if(du>=0&&du<7)badges+=`<span class="badge b-urgent">URGENT</span>`;return`<div class="proj-card ${hc}" onclick="openProjectDetail('${p.id}')"><div class="proj-top"><div><div class="proj-name">${p.project_name}</div><div class="proj-client">${p.client}</div></div><div class="proj-badges">${badges}</div></div><div class="proj-vals"><div class="pv"><div class="pv-lbl">Contract</div><div class="pv-num">${p.contract_value?fmt(p.contract_value):'TBD'}</div></div><div class="pv"><div class="pv-lbl">Expected</div><div class="pv-num">${p.contract_value?fmt(p.expected_value):'—'}</div></div><div class="pv"><div class="pv-lbl">Collected</div><div class="pv-num">${p.collected_amount?fmt(p.collected_amount):'₱0'}</div></div></div><div class="proj-foot"><span>${stars(p.probability_rating)} ${Math.round((p.probability_percent||0)*100)}%</span><span>${p.days_inactive}d inactive</span></div></div>`}function closeModal(id){document.getElementById(id).classList.remove('open')}async function openProjectAdd(){document.getElementById('modal-title').textContent='Add Project';document.getElementById('f-id').value='';['f-name','f-client','f-owner','f-step','f-cv','f-col','f-start','f-close'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-entity').value='OHI';document.getElementById('f-stage').value='Prospect';document.getElementById('del-btn').style.display='none';document.getElementById('proj-modal').classList.add('open')}async function openProjectDetail(id){const p=projects.find(x=>x.id===id);if(!p){toast('Not found');return}document.getElementById('modal-title').textContent='Edit: '+p.project_name;document.getElementById('f-id').value=p.id;document.getElementById('f-name').value=p.project_name;document.getElementById('f-client').value=p.client||'';document.getElementById('f-owner').value=p.owner||'';document.getElementById('f-entity').value=p.entity;document.getElementById('f-stage').value=p.stage;document.getElementById('f-cv').value=p.contract_value||'';document.getElementById('f-col').value=p.collected_amount||0;document.getElementById('f-start').value=p.start_date||'';document.getElementById('f-close').value=p.expected_close_date||'';document.getElementById('f-step').value=p.current_step||'';if(curUser.role==='admin')document.getElementById('del-btn').style.display='';document.getElementById('proj-modal').classList.add('open')}async function saveProject(){const id=document.getElementById('f-id').value;const name=document.getElementById('f-name').value.trim();if(!name){toast('Name required');return}const data={project_name:name,client:document.getElementById('f-client').value.trim(),owner:document.getElementById('f-owner').value.trim(),entity:document.getElementById('f-entity').value,stage:document.getElementById('f-stage').value,contract_value:parseFloat(document.getElementById('f-cv').value)||0,collected_amount:parseFloat(document.getElementById('f-col').value)||0,start_date:document.getElementById('f-start').value,expected_close_date:document.getElementById('f-close').value,current_step:document.getElementById('f-step').value.trim(),last_activity_date:today(),updated_by:curUser.id};if(id){await sb.from('pp_projects').update(data).eq('id',id)}else{data.next_steps=[];data.tasks=[];data.billing=[];data.collections=[];await sb.from('pp_projects').insert(data)}await sb.from('pp_audit_log').insert({user_id:curUser.id,event_type:id?'project_edit':'project_add',details:{project:name}});await loadProjects();closeModal('proj-modal');refreshTab();toast(id?'Updated':'Created')}async function deleteProject(){const id=document.getElementById('f-id').value;if(!id||curUser.role!=='admin'){toast('Unauthorized');return}if(!confirm('Delete this project?'))return;const name=projects.find(p=>p.id===id)?.project_name;await sb.from('pp_projects').delete().eq('id',id);await sb.from('pp_audit_log').insert({user_id:curUser.id,event_type:'project_delete',details:{project:name}});await loadProjects();closeModal('proj-modal');refreshTab();toast('Deleted')}function switchAdminTab(tab,btn){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('admin-users-tab').style.display='none';document.getElementById('admin-audit-tab').style.display='none';document.getElementById('admin-security-tab').style.display='none';document.getElementById('admin-'+tab+'-tab').style.display='block';if(tab==='audit')loadAuditTab();if(tab==='security')loadSecurityTab()}async function loadAuditTab(){const {data:logs}=await sb.from('pp_audit_log').select('*').order('created_at',{ascending:false}).limit(100).catch(()=>({data:[]}));const {data:users}=await sb.from('pp_users').select('*').catch(()=>({data:[]}));let html='<tr><th>User</th><th>Event</th><th>Date</th></tr>';(logs||[]).forEach(log=>{const u=users.find(x=>x.id===log.user_id);html+=`<tr><td>${u?.display_name||'?'}</td><td>${log.event_type}</td><td>${new Date(log.created_at).toLocaleString()}</td></tr>`});document.getElementById('audit-table').innerHTML=html}async function loadSecurityTab(){const {data:users}=await sb.from('pp_users').select('*').catch(()=>({data:[]}));let html='<div style="font-size:11px;line-height:1.6">';(users||[]).forEach(u=>{const locked=u.locked_until&&new Date(u.locked_until)>new Date();html+=`<div style="background:#242b32;padding:8px;margin-bottom:6px;border-radius:4px"><div style="color:#0F6E56;font-weight:600">${u.display_name} (${u.role})</div><div style="color:#ccc;font-size:10px">Failed: ${u.failed_attempts||0} | ${locked?'🔴 LOCKED':'🟢 Active'}</div></div>`});html+='</div>';document.getElementById('security-info').innerHTML=html}function openNewUserForm(){toast('Not yet available')}function showLogin(){document.getElementById('app-container').style.display='none';showScreen('login-screen')}async function logout(){if(curUser)await sb.from('pp_audit_log').insert({user_id:curUser.id,event_type:'logout'});sessionStorage.removeItem('pp_token');curUser=null;document.getElementById('passkey-input').value='';document.getElementById('sq-input').value='';document.getElementById('pk-error').textContent='';document.getElementById('sq-error').textContent='';showLogin()}function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}initSupabase();</script></body></html>
